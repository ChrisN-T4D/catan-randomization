services:
  catan-randomization:
    build: .
    container_name: catan-randomization
    restart: unless-stopped
    networks:
      - default
      - traefik_proxy
    labels:
      traefik.enable: true
      traefik.docker.network: traefik_proxy

      traefik.http.routers.cr.entrypoints: websecure
      traefik.http.routers.cr.rule: Host(`${HOST}`)
      traefik.http.routers.cr.tls.certresolver: le
      traefik.http.routers.cr.service: cr
      traefik.http.services.cr.loadbalancer.server.port: 80

      traefik.http.routers.cr.middlewares: limit@docker
      traefik.http.middlewares.limit.buffering.maxRequestBodyBytes: 10737418240
      traefik.http.middlewares.limit.buffering.memRequestBodyBytes: 200000000
      traefik.http.middlewares.limit.buffering.maxResponseBodyBytes: 10737418240
      traefik.http.middlewares.limit.buffering.memResponseBodyBytes: 200000000

networks:
  traefik_proxy:
    external: true
