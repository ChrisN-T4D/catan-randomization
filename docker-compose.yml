# Static Catan board — Traefik only (no host ports). Build locally (no registry image).
#
# Required — set in Portainer stack environment or a local .env file (not committed):
#   HOST=your.public.hostname
#
# Checklist if the site does not load:
#   - DNS A/AAAA for HOST → your Traefik public IP
#   - Traefik container on network "traefik_proxy" (same name as below)
#   - Stack env HOST matches the URL you open in the browser
#   - In Traefik dashboard: router "cr" should be green (cert resolver "le" must match your Traefik static config)
#   - docker logs on this container; curl from Traefik host: docker exec traefik wget -qO- http://<container-ip>/

services:
  catan-randomization:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: catan-randomization
    restart: unless-stopped
    networks:
      - traefik_proxy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      traefik.enable: "true"
      traefik.docker.network: traefik_proxy

      traefik.http.routers.cr.entrypoints: websecure
      traefik.http.routers.cr.rule: Host(`${HOST}`)
      traefik.http.routers.cr.tls.certresolver: le
      traefik.http.routers.cr.service: cr-svc

      traefik.http.services.cr-svc.loadbalancer.server.port: "80"

networks:
  traefik_proxy:
    external: true
